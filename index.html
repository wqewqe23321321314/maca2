<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бюджет: доходы и траты</title>
    <meta name="description" content="Учёт бюджета: введи имя, доход и траты — узнай остаток">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Мой бюджет</h1>
        <p class="subtitle">Доходы - траты = итог</p>

        <div class="form-group">
            <label>👤 Имя</label>
            <input type="text" id="nameInput" placeholder="Введите имя" autocomplete="off">
        </div>

        <div class="form-group">
            <label>💰 Бюджет (рублей всего)</label>
            <input type="number" id="budgetInput" placeholder="Сумма в рублях" value="0" step="100">
        </div>

        <div class="expenses-header">
            <label>💸 Траты (можно добавить несколько)</label>
            <button type="button" id="addExpenseBtn" class="small-btn">+ Добавить трату</button>
        </div>

        <div id="expensesList">
            <div class="expense-item">
                <input type="text" class="expense-name" placeholder="На что (еда, такси...)" value="Продукты">
                <input type="number" class="expense-amount" placeholder="Сумма" value="0" step="100">
                <button class="remove-expense" disabled>✖</button>
            </div>
        </div>

        <button id="calcBtn">🧮 Рассчитать остаток</button>

        <div class="result-card" id="resultCard">
            <div class="result-icon">💡</div>
            <div class="result-text" id="resultText">
                Здесь появится результат
            </div>
        </div>

        <footer>Отрицательный остаток — значит, вы потратили больше, чем было.</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
