<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Крестики-нолики | Tic‑Tac‑Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <h1>❌ КРЕСТИКИ-НОЛИКИ ⭕</h1>
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="2p">👥 2 игрока</button>
        <button class="mode-btn" data-mode="ai">🤖 против ИИ</button>
    </div>

    <div class="board" id="board">
        <!-- 9 клеток будут созданы через JS -->
    </div>

    <div class="status" id="statusMessage">Ход: ❌</div>
    <button class="reset-btn" id="resetBtn">🔄 Новая игра</button>
    <div class="footer">⭐ кликни по клетке, чтобы сделать ход ⭐</div>
</div>

<script src="script.js"></script>
</body>
</html>
